<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>阿福 · 我的檔案</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#090908;--gold:#c9a84c;--gold-dim:rgba(201,168,76,0.25);
  --card:rgba(255,255,255,0.03);--text:#e8d5b7;--sub:rgba(232,213,183,0.5);
  --green:#4caf82;--red:#e05555;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,'PingFang TC',sans-serif;min-height:100vh;}

.hd{
  padding:env(safe-area-inset-top,20px) 16px 16px;
  background:rgba(9,9,8,0.97);border-bottom:1px solid var(--gold-dim);
  position:sticky;top:0;z-index:10;display:flex;align-items:center;gap:12px;
}
.hd-back{background:none;border:none;color:var(--gold);font-size:22px;cursor:pointer;padding:2px 6px;}
.hd-title{font-size:17px;letter-spacing:1.5px;color:var(--gold);flex:1;}

/* tabs */
.tabs{display:flex;border-bottom:1px solid var(--gold-dim);background:rgba(9,9,8,0.95);
  position:sticky;top:calc(env(safe-area-inset-top,20px) + 56px);z-index:9;}
.tab{flex:1;padding:12px;text-align:center;font-size:13px;color:var(--sub);
  border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;transition:.2s;}
.tab.active{color:var(--gold);border-bottom-color:var(--gold);}

/* search */
.search-row{padding:12px 16px;display:flex;gap:10px;}
.search-input{
  flex:1;background:rgba(201,168,76,0.07);border:1px solid var(--gold-dim);
  border-radius:20px;color:var(--text);font-size:15px;padding:9px 16px;
  outline:none;font-family:inherit;
}
.search-input::placeholder{color:var(--sub);}

/* upload button */
.upload-btn{
  display:flex;align-items:center;justify-content:center;gap:8px;
  margin:0 16px 12px;padding:14px;border-radius:14px;
  border:1.5px dashed rgba(201,168,76,0.35);background:rgba(201,168,76,0.05);
  color:var(--gold);font-size:14px;cursor:pointer;font-family:inherit;
  transition:background .2s;
}
.upload-btn:active{background:rgba(201,168,76,0.12);}
#file-input{display:none;}

/* file list */
.file-list{padding:0 16px;}
.file-item{
  display:flex;align-items:center;gap:12px;
  padding:14px 0;border-bottom:1px solid rgba(201,168,76,0.08);
}
.file-item:last-child{border-bottom:none;}
.file-icon{font-size:28px;flex-shrink:0;width:36px;text-align:center;}
.file-info{flex:1;min-width:0;}
.file-name{font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.file-meta{font-size:11px;color:var(--sub);margin-top:3px;}
.file-acts{display:flex;gap:8px;flex-shrink:0;}
.icon-btn{
  background:none;border:1px solid var(--gold-dim);border-radius:8px;
  color:var(--gold);font-size:13px;padding:5px 10px;cursor:pointer;
}

/* empty state */
.empty{text-align:center;padding:50px 20px;color:var(--sub);}
.empty-icon{font-size:48px;margin-bottom:12px;}

/* progress bar for upload */
.progress-wrap{margin:0 16px 12px;display:none;}
.progress-bar-bg{background:rgba(201,168,76,0.12);border-radius:4px;height:4px;overflow:hidden;}
.progress-bar{height:100%;background:var(--gold);width:0;transition:width .3s;}
.progress-label{font-size:12px;color:var(--sub);margin-top:5px;}

/* toast */
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);
  background:rgba(76,175,130,0.9);color:#fff;padding:10px 22px;border-radius:20px;
  font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;z-index:99;}
.toast.show{opacity:1;}

/* loading spinner */
.spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--gold-dim);
  border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{text-align:center;padding:30px;color:var(--sub);}
</style>
</head>
<body>

<div class="hd">
  <button class="hd-back" onclick="history.back()">‹</button>
  <div class="hd-title">我的檔案</div>
  <div id="file-count" style="font-size:12px;color:var(--sub);"></div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('local')">📱 本機 / 手機</button>
  <button class="tab" onclick="switchTab('drive')">☁️ Google Drive</button>
</div>

<!-- LOCAL TAB -->
<div id="tab-local">
  <div class="search-row">
    <input class="search-input" id="local-search" placeholder="搜尋檔案名稱或描述…"
      oninput="debounce(()=>loadLocal(),400)" autocomplete="off">
  </div>

  <button class="upload-btn" onclick="document.getElementById('file-input').click()">
    ＋ 從手機 / 電腦上傳檔案
  </button>
  <input type="file" id="file-input" multiple onchange="uploadFiles(this.files)">

  <div class="progress-wrap" id="prog-wrap">
    <div class="progress-bar-bg"><div class="progress-bar" id="prog-bar"></div></div>
    <div class="progress-label" id="prog-label">上傳中…</div>
  </div>

  <div class="file-list" id="local-list">
    <div class="loading"><div class="spinner"></div></div>
  </div>
</div>

<!-- DRIVE TAB -->
<div id="tab-drive" style="display:none;">
  <div class="search-row">
    <input class="search-input" id="drive-search" placeholder="搜尋 Google Drive 檔案…"
      oninput="debounce(()=>loadDrive(),500)" autocomplete="off">
  </div>
  <div class="file-list" id="drive-list">
    <div class="loading"><div class="spinner"></div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = '/alfred/api';
let _currentTab = 'local';
let _debTimer = null;

function debounce(fn, ms) { clearTimeout(_debTimer); _debTimer = setTimeout(fn, ms); }

function switchTab(tab) {
  _currentTab = tab;
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active', (i===0&&tab==='local')||(i===1&&tab==='drive')));
  document.getElementById('tab-local').style.display = tab === 'local' ? '' : 'none';
  document.getElementById('tab-drive').style.display = tab === 'drive' ? '' : 'none';
  if (tab === 'drive') loadDrive();
}

function mimeIcon(mime) {
  if (!mime) return '📎';
  if (mime.includes('pdf')) return '📄';
  if (mime.includes('word') || mime.includes('document')) return '📝';
  if (mime.includes('sheet') || mime.includes('excel')) return '📊';
  if (mime.includes('presentation') || mime.includes('powerpoint')) return '📊';
  if (mime.includes('image')) return '🖼';
  if (mime.includes('video')) return '🎬';
  if (mime.includes('audio')) return '🎵';
  if (mime.includes('zip') || mime.includes('compressed')) return '📦';
  if (mime.includes('text')) return '📃';
  return '📎';
}

function fmtSize(bytes) {
  if (!bytes) return '—';
  if (bytes < 1024) return bytes + 'B';
  if (bytes < 1048576) return (bytes/1024).toFixed(0) + 'KB';
  return (bytes/1048576).toFixed(1) + 'MB';
}

function fmtDate(ts) {
  if (!ts) return '';
  return ts.slice(0,10);
}

async function loadLocal() {
  const q = document.getElementById('local-search').value;
  const r = await fetch(`${API}/files?q=${encodeURIComponent(q)}&limit=50`);
  const files = await r.json();
  document.getElementById('file-count').textContent = files.length ? `${files.length} 個` : '';
  const el = document.getElementById('local-list');
  if (!files.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">📂</div>
      <div>${q ? '找不到符合的檔案' : '還沒有上傳任何檔案'}</div>
      <div style="font-size:12px;margin-top:8px;">點上方按鈕從手機或電腦上傳</div></div>`;
    return;
  }
  el.innerHTML = files.map(f => `
    <div class="file-item" id="fi-${f.id}">
      <div class="file-icon">${mimeIcon(f.mime)}</div>
      <div class="file-info">
        <div class="file-name" title="${f.name}">${f.name}</div>
        <div class="file-meta">${fmtSize(f.size)} · ${fmtDate(f.ts)}${f.description ? ' · ' + f.description : ''}</div>
      </div>
      <div class="file-acts">
        <button class="icon-btn" onclick="downloadFile(${f.id},'${f.name.replace(/'/g,"\\'")}')">↓</button>
        <button class="icon-btn" style="color:var(--red);border-color:rgba(224,85,85,0.3);" onclick="deleteFile(${f.id})">✕</button>
      </div>
    </div>`).join('');
}

async function loadDrive() {
  const q = document.getElementById('drive-search').value;
  const el = document.getElementById('drive-list');
  el.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  try {
    const r = await fetch(`${API}/drive/files?q=${encodeURIComponent(q)}`);
    const d = await r.json();
    if (d.error) {
      el.innerHTML = `<div class="empty"><div class="empty-icon">🔑</div>
        <div>Google Drive 未授權</div>
        <div style="margin-top:12px;">
          <a href="${API}/gcal/authorize" style="color:var(--gold);font-size:13px;">點此授權 Google Drive →</a>
        </div></div>`;
      return;
    }
    const files = d.files || [];
    document.getElementById('file-count').textContent = files.length ? `${files.length} 個` : '';
    if (!files.length) {
      el.innerHTML = `<div class="empty"><div class="empty-icon">☁️</div>
        <div>${q ? '找不到符合的檔案' : 'Google Drive 沒有檔案'}</div></div>`;
      return;
    }
    el.innerHTML = files.map(f => `
      <div class="file-item">
        <div class="file-icon">${f.icon || '📎'}</div>
        <div class="file-info">
          <div class="file-name" title="${f.name}">${f.name}</div>
          <div class="file-meta">${f.size} · ${f.modified}</div>
        </div>
        <div class="file-acts">
          ${f.url ? `<button class="icon-btn" onclick="window.open('${f.url}','_blank')">↗</button>` : ''}
        </div>
      </div>`).join('');
  } catch(e) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><div>載入失敗，請稍後再試</div></div>`;
  }
}

async function uploadFiles(fileList) {
  const wrap = document.getElementById('prog-wrap');
  const bar = document.getElementById('prog-bar');
  const label = document.getElementById('prog-label');
  wrap.style.display = '';
  let done = 0;
  for (const file of fileList) {
    label.textContent = `上傳中：${file.name}`;
    const fd = new FormData();
    fd.append('file', file);
    try {
      await fetch(`${API}/files/upload`, { method: 'POST', body: fd });
    } catch(e) {}
    done++;
    bar.style.width = (done / fileList.length * 100) + '%';
  }
  label.textContent = `✅ 上傳完成（${done} 個）`;
  setTimeout(() => { wrap.style.display = 'none'; bar.style.width = '0'; }, 2000);
  document.getElementById('file-input').value = '';
  showToast(`✅ 已上傳 ${done} 個檔案`);
  loadLocal();
}

function downloadFile(id, name) {
  const a = document.createElement('a');
  a.href = `${API}/files/${id}`;
  a.download = name;
  a.click();
}

async function deleteFile(id) {
  if (!confirm('確定要刪除這個檔案？')) return;
  await fetch(`${API}/files/${id}`, { method: 'DELETE' });
  document.getElementById('fi-' + id)?.remove();
  showToast('已刪除');
  loadLocal();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// Init
loadLocal();
</script>
</body>
</html>
